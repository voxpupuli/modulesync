---
name: 🏷️ Pull Request Labeler

on:
  - pull_request_target

permissions: {}

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    if: github.repository_owner == 'voxpupuli' || github.repository_owner == 'OpenVoxProject'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/labeler@bf12e9b00b37c5c0ca2b87b79b2daf7891dbda13 # v7.0.0
